services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: crm_shared
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: always
    ports:
      - "6379:6379"

  identity-service:
    image: identity-service:latest
    container_name: identity-service
    build:
      context: ./backend/services/Identity
      dockerfile: Identity.Api/Dockerfile
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80;https://+:443
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - ConnectionStrings__RedisConnection=redis:6379
      - MessageBus__Host=rabbitmq
    ports:
      - "5118:80"
      - "7136:443"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  ecommerce-service:
    image: ecommerce-service:latest
    container_name: ecommerce-service
    build:
      context: ./backend/services/ECommerce
      dockerfile: ECommerce.Api/Dockerfile
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80;https://+:443
      - ConnectionStrings__ECommerceConnection=${ConnectionStrings__ECommerceConnection}
      - MessageBus__Host=rabbitmq
    ports:
      - "5169:80"
      - "7062:443"
    depends_on:
      - postgres
      - rabbitmq

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80;https://+:443
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://identity-service:80
      - ReverseProxy__Clusters__ecommerce-cluster__Destinations__destination1__Address=http://ecommerce-service:80
      - ReverseProxy__Clusters__crmchat-cluster__Destinations__destination1__Address=http://crmchat-service:80
    ports:
      - "5119:80"
      - "7013:443"
    depends_on:
      - identity-service
      - ecommerce-service
      - crmchat-service

  crmchat-service:
    image: crmchat-service:latest
    container_name: crmchat-service
    build:
      context: .
      dockerfile: ./backend/services/Chat/Dockerfile
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - ConnectionStrings__RedisConnection=redis:6379
      - MessageBus__Host=rabbitmq
    ports:
      - "5125:80"
      - "7068:443"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  notification-service:
    image: notification-service:latest
    container_name: notification-service
    build:
      context: .
      dockerfile: ./backend/services/Notification/Dockerfile
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - MessageBus__Host=rabbitmq
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__UseSsl=false
      - Smtp__Username=${SMTP_USER}
      - Smtp__Password=${SMTP_PASSWORD}
    depends_on:
      - postgres
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: crm-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
